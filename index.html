<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ff6b35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>My Workout</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/screens.css">
</head>
<body>

<!-- Install Banner -->
<div id="install-banner">
  <span>📲 Add to Home Screen for the best experience</span>
  <button class="btn btn-primary btn-sm" id="install-btn">Install</button>
  <button class="btn btn-ghost btn-sm" id="install-dismiss">✕</button>
</div>

<!-- App Shell -->
<div id="app">
  <div id="screen-container">

    <!-- Today Screen -->
    <div class="screen active" id="screen-today"></div>

    <!-- Schedule Screen -->
    <div class="screen" id="screen-schedule"></div>

    <!-- Records Screen -->
    <div class="screen" id="screen-records"></div>

    <!-- History Screen -->
    <div class="screen" id="screen-history"></div>

    <!-- Settings Screen -->
    <div class="screen" id="screen-settings"></div>

  </div>

  <!-- Bottom Navigation -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-screen="today" title="Today">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Today
    </button>
    <button class="nav-btn" data-screen="schedule" title="Schedule">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Schedule
    </button>
    <button class="nav-btn" data-screen="records" title="Records">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      PRs
    </button>
    <button class="nav-btn" data-screen="history" title="History">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      History
    </button>
    <button class="nav-btn" data-screen="settings" title="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
  </nav>
</div>

<!-- Rest Timer Overlay -->
<div id="timer-overlay">
  <div class="timer-label">Rest</div>
  <div class="timer-ring-container">
    <svg width="200" height="200" viewBox="0 0 200 200">
      <circle class="timer-bg" cx="100" cy="100" r="88" stroke-width="8" fill="none"/>
      <circle id="timer-progress" class="timer-progress" cx="100" cy="100" r="88" stroke-width="8" fill="none"
        style="stroke-dasharray:553;stroke-dashoffset:0"/>
    </svg>
    <div class="timer-digits" id="timer-digits">3:00</div>
  </div>
  <div class="timer-exercise" id="timer-exercise-label"></div>
  <div class="timer-controls">
    <button class="timer-adj" id="timer-minus30">−30s</button>
    <button class="timer-skip" id="timer-skip">Skip</button>
    <button class="timer-adj" id="timer-plus30">+30s</button>
  </div>
</div>

<!-- PR Banner -->
<div id="pr-banner">
  <div class="pr-content">
    <div class="pr-icon">🏆</div>
    <div class="pr-text">
      <h3>New Personal Record!</h3>
      <p id="pr-details"></p>
    </div>
  </div>
</div>

<!-- Substitute Sheet -->
<div id="sub-sheet">
  <div class="sub-backdrop"></div>
  <div class="sub-panel">
    <div class="sub-handle"></div>
    <div class="sub-title">Choose an alternative</div>
    <div class="sub-list"></div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
